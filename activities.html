<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <title>Activities - Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Poppins', sans-serif; min-height: 100vh; background-color: #442858; color: #fff; }
        
        header { padding: 1.7rem 1rem; display: flex; justify-content: space-between; max-width: 80%; margin: auto; align-items: center; background-color: transparent; }
        
        .logo a { color: #fff; text-decoration: none; font-size: 1.3rem; font-weight: 800; }
        
        nav a { color: #fff; text-decoration: none; font-size: .97rem; font-weight: 600; padding: 0.4rem 1rem; }
        
        nav a.active, nav a:hover { color: #f4bebe; transition: all .3s ease-in-out; }
        section { margin: 2rem 8.5rem; }

        .main { display: flex; flex-direction: column; margin: 5rem auto; }

        .main h1 { font-size: 2.5rem; font-weight: 600; color: #fff; margin-bottom: 2rem; }

        .main h1 span { color: #f4bebe; }

        .activity-list { list-style: none; }

        .activity-item { background: rgba(255, 255, 255, 0.05); border-left: 5px solid #f4bebe; padding: 1.5rem; margin-bottom: 1rem; border-radius: 0 10px 10px 0; transition: 0.3s; }

        .activity-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(10px); cursor: pointer; }

        .activity-item h3 { color: #f4bebe; margin-bottom: 0.5rem; }

        .upload-form { background: rgba(255, 255, 255, 0.05); padding: 2rem; border-radius: 15px; border: 1px solid rgba(244, 190, 190, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15); margin-top: 3rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #f4bebe; font-size: 0.95rem; }
        .form-group input { width: 100%; padding: 11px; background: #3a224a; border: 1px solid rgba(244, 190, 190, 0.3); color: white; border-radius: 6px; font-family: inherit; transition: 0.3s; }
        .form-group input:focus { outline: none; border-color: #f4bebe; }
        .form-group input[type="file"] { padding: 8px; background: rgba(255,255,255,0.01); cursor: pointer; }
        
        .btn-submit { background: #f4bebe; color: #442858; padding: 12px 25px; border: none; border-radius: 6px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 0.5rem; }
        .btn-submit:hover { background: white; }

        #click { display: none; }
        .menu { display: none; }

        @media only screen and (max-width:480px) {
            .menu { display: block; font-size: 1.5rem; color: #f4bebe; }
            header { max-width: 100%; }
            nav { position: absolute; display: grid; top: 75px; text-align: center; background-color: #442858; left: -100%; z-index: 1; width: 100%; padding: 1rem 0; }
            #click:checked~nav { left: 0%; transition: all 0.3s ease; }
            section { margin: 1rem 1.5rem; }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo"><a href="index.html">Student Portfolio</a></div>
        <input type="checkbox" id="click">
        <label for="click" class="mainicon"><div class="menu"><i class="bi bi-list"></i></div></label>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="activities.html" class="active">Activities</a>
            <a href="quizzes.html">Quizzes</a>
            <a href="exams.html">Exams</a>
        </nav>
    </header>

    <section>
        <div class="main">
            <h1>My <span>Activities</span></h1>
            <div class="activity-list">
                
                <a href="carousel.html" style="text-decoration: none; color: inherit; display: block;">
                    <div class="activity-item">
                        <h3>Activity 1</h3>
                        <p>Created a CSS Image Carousel.</p>
                    </div>
                </a>

                <a href="registration.html" style="text-decoration: none; color: inherit; display: block;">
                    <div class="activity-item">
                        <h3>Activity 2</h3>
                        <p>Created a Registration Form.</p>
                    </div>
                </a>

                <a href="javascript.html" style="text-decoration: none; color: inherit; display: block;">
                    <div class="activity-item">
                        <h3>Activity 3</h3>
                        <p>Created JavaScript Sample Buttons.</p>
                    </div>
                </a>

            </div>

            <h1 style="margin-top: 3rem;">Upload <span>Activities</span></h1>
            <form class="upload-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>Activity Details</label>
                    <input type="text" placeholder="Enter Activity Info..">
                </div>
                <div class="form-group">
                    <label>Upload Activity File</label>
                    <input type="file">
                </div>
                <div class="form-group">
                    <label>Upload Activity Image</label>
                    <input type="file" accept="image/*">
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </section>
</body>

</html>
